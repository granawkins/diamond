<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diamond Rover</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7f8;
        color: #142126;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 10px;
        font-size: 32px;
      }

      p {
        margin: 0;
        color: #46585f;
        font-size: 16px;
        line-height: 1.5;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #10181b;
          color: #eef5f4;
        }

        p {
          color: #b8c8cc;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Diamond Rover</h1>
      <p>Xbox drive service is the active control path.</p>
    </main>
  </body>
</html>
