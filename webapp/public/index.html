<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motor Pulse</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7f8;
        color: #142126;
      }

      body {
        margin: 0;
        padding: 24px 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        display: grid;
        gap: 18px;
        width: min(560px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 20px;
        font-size: 28px;
        font-weight: 700;
      }

      h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .panel {
        display: grid;
        gap: 18px;
        padding: 20px;
        border: 1px solid #d8e0e3;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgb(20 33 38 / 10%);
      }

      fieldset {
        margin: 0;
        padding: 0;
        border: 0;
        display: grid;
        gap: 10px;
      }

      legend,
      label {
        font-size: 14px;
        font-weight: 650;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .segmented input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segmented span,
      button {
        display: grid;
        min-height: 44px;
        place-items: center;
        border: 1px solid #c7d1d6;
        border-radius: 6px;
        background: #f7fafb;
        color: #142126;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      .segmented input:checked + span {
        border-color: #147d64;
        background: #dff4ec;
        color: #0c513f;
      }

      .range-row {
        display: grid;
        grid-template-columns: 1fr 72px;
        gap: 12px;
        align-items: center;
      }

      input[type="range"] {
        width: 100%;
      }

      input[type="number"] {
        min-height: 40px;
        padding: 0 10px;
        border: 1px solid #c7d1d6;
        border-radius: 6px;
        font: inherit;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .mix-grid {
        display: grid;
        grid-template-columns: minmax(180px, 240px) 1fr;
        gap: 18px;
        align-items: start;
      }

      .pad {
        position: relative;
        aspect-ratio: 1;
        border: 1px solid #c7d1d6;
        border-radius: 8px;
        background:
          linear-gradient(#d8e0e3, #d8e0e3) 50% / 1px 100% no-repeat,
          linear-gradient(90deg, #d8e0e3, #d8e0e3) 50% / 100% 1px no-repeat,
          #f7fafb;
        touch-action: none;
        cursor: crosshair;
      }

      .pad::before {
        content: "";
        position: absolute;
        inset: 12px;
        border: 1px dashed #b9c5ca;
        border-radius: 6px;
        pointer-events: none;
      }

      .stick {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 28px;
        height: 28px;
        border: 2px solid white;
        border-radius: 999px;
        background: #147d64;
        box-shadow: 0 8px 18px rgb(20 33 38 / 20%);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .readout {
        display: grid;
        gap: 8px;
        font-size: 14px;
      }

      .readout-row {
        display: grid;
        grid-template-columns: 76px 1fr 52px;
        gap: 8px;
        align-items: center;
      }

      .meter {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: #d8e0e3;
      }

      .meter span {
        display: block;
        width: 50%;
        height: 100%;
        background: #147d64;
        transform-origin: left center;
      }

      button.primary {
        border-color: #147d64;
        background: #147d64;
        color: white;
      }

      button.danger {
        border-color: #9b2f2f;
        background: #9b2f2f;
        color: white;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      pre {
        min-height: 88px;
        margin: 0;
        overflow: auto;
        padding: 12px;
        border-radius: 6px;
        background: #10181b;
        color: #dce9e6;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #10181b;
          color: #eef5f4;
        }

        .panel {
          border-color: #304247;
          background: #172326;
          box-shadow: none;
        }

        .segmented span,
        button,
        input[type="number"] {
          border-color: #41565c;
          background: #203035;
          color: #eef5f4;
        }

        .pad {
          border-color: #41565c;
          background:
            linear-gradient(#41565c, #41565c) 50% / 1px 100% no-repeat,
            linear-gradient(90deg, #41565c, #41565c) 50% / 100% 1px no-repeat,
            #203035;
        }

        .pad::before {
          border-color: #516971;
        }

        .meter {
          background: #304247;
        }
      }

      @media (max-width: 620px) {
        .mix-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Motor Pulse</h1>
      <form class="panel" id="pulse-form">
        <fieldset>
          <legend>Side</legend>
          <div class="segmented">
            <label>
              <input type="radio" name="side" value="left" checked />
              <span>Left</span>
            </label>
            <label>
              <input type="radio" name="side" value="right" />
              <span>Right</span>
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Direction</legend>
          <div class="segmented">
            <label>
              <input type="radio" name="direction" value="forward" checked />
              <span>Forward</span>
            </label>
            <label>
              <input type="radio" name="direction" value="reverse" />
              <span>Reverse</span>
            </label>
          </div>
        </fieldset>

        <label for="speed">Speed</label>
        <div class="range-row">
          <input id="speed" name="speed" type="range" min="0" max="1" step="0.05" value="1" />
          <input id="speed-number" type="number" min="0" max="1" step="0.05" value="1" />
        </div>

        <label for="seconds">Seconds</label>
        <div class="range-row">
          <input id="seconds" name="seconds" type="range" min="0.1" max="5" step="0.1" value="0.5" />
          <input id="seconds-number" type="number" min="0.1" max="5" step="0.1" value="0.5" />
        </div>

        <div class="actions">
          <button class="primary" type="submit">Pulse</button>
          <button class="danger" type="button" id="stop">Stop</button>
        </div>

        <pre id="log">Ready.</pre>
      </form>

      <section class="panel">
        <h2>Mixed Drive</h2>

        <div class="mix-grid">
          <div class="pad" id="mix-pad" role="application" aria-label="Mixed drive pad">
            <div class="stick" id="mix-stick"></div>
          </div>

          <div class="readout">
            <div class="readout-row">
              <span>Throttle</span>
              <div class="meter"><span id="throttle-meter"></span></div>
              <strong id="throttle-value">0%</strong>
            </div>
            <div class="readout-row">
              <span>Steering</span>
              <div class="meter"><span id="steering-meter"></span></div>
              <strong id="steering-value">0%</strong>
            </div>
            <div class="readout-row">
              <span>Left</span>
              <div class="meter"><span id="left-meter"></span></div>
              <strong id="left-value">0%</strong>
            </div>
            <div class="readout-row">
              <span>Right</span>
              <div class="meter"><span id="right-meter"></span></div>
              <strong id="right-value">0%</strong>
            </div>

            <label for="mix-seconds">Seconds</label>
            <div class="range-row">
              <input id="mix-seconds" type="range" min="0.1" max="5" step="0.1" value="0.5" />
              <input id="mix-seconds-number" type="number" min="0.1" max="5" step="0.1" value="0.5" />
            </div>

            <div class="actions">
              <button class="primary" type="button" id="mix-pulse">Pulse Mix</button>
              <button class="danger" type="button" id="mix-reset">Center</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#pulse-form");
      const log = document.querySelector("#log");
      const speed = document.querySelector("#speed");
      const speedNumber = document.querySelector("#speed-number");
      const seconds = document.querySelector("#seconds");
      const secondsNumber = document.querySelector("#seconds-number");
      const stop = document.querySelector("#stop");
      const mixPad = document.querySelector("#mix-pad");
      const mixStick = document.querySelector("#mix-stick");
      const mixSeconds = document.querySelector("#mix-seconds");
      const mixSecondsNumber = document.querySelector("#mix-seconds-number");
      const mixPulse = document.querySelector("#mix-pulse");
      const mixReset = document.querySelector("#mix-reset");
      const throttleMeter = document.querySelector("#throttle-meter");
      const steeringMeter = document.querySelector("#steering-meter");
      const leftMeter = document.querySelector("#left-meter");
      const rightMeter = document.querySelector("#right-meter");
      const throttleValue = document.querySelector("#throttle-value");
      const steeringValue = document.querySelector("#steering-value");
      const leftValue = document.querySelector("#left-value");
      const rightValue = document.querySelector("#right-value");
      const buttons = Array.from(document.querySelectorAll("button"));
      const mixState = { throttle: 0, steering: 0, left: 0, right: 0 };

      function bindPair(range, number) {
        range.addEventListener("input", () => {
          number.value = range.value;
        });

        number.addEventListener("input", () => {
          range.value = number.value;
        });
      }

      function formValue(name) {
        return new FormData(form).get(name);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function percent(value) {
        return `${Math.round(value * 100)}%`;
      }

      function setMeter(element, value) {
        const magnitude = Math.abs(value);
        element.style.transform = `scaleX(${magnitude})`;
        element.style.marginLeft = value < 0 ? `${50 - magnitude * 50}%` : "50%";
        element.style.background = value < 0 ? "#9b2f2f" : "#147d64";
      }

      function setMix(throttle, steering) {
        const rawLeft = throttle + steering;
        const rawRight = throttle - steering;
        const scale = Math.max(1, Math.abs(rawLeft), Math.abs(rawRight));

        mixState.throttle = throttle;
        mixState.steering = steering;
        mixState.left = rawLeft / scale;
        mixState.right = rawRight / scale;

        mixStick.style.left = `${50 + steering * 50}%`;
        mixStick.style.top = `${50 - throttle * 50}%`;

        throttleValue.textContent = percent(throttle);
        steeringValue.textContent = percent(steering);
        leftValue.textContent = percent(mixState.left);
        rightValue.textContent = percent(mixState.right);

        setMeter(throttleMeter, throttle);
        setMeter(steeringMeter, steering);
        setMeter(leftMeter, mixState.left);
        setMeter(rightMeter, mixState.right);
      }

      function setMixFromPointer(event) {
        const rect = mixPad.getBoundingClientRect();
        const x = clamp((event.clientX - rect.left) / rect.width, 0, 1);
        const y = clamp((event.clientY - rect.top) / rect.height, 0, 1);

        setMix((0.5 - y) * 2, (x - 0.5) * 2);
      }

      async function pulse(payload, endpoint = "/api/pulse") {
        buttons.forEach((button) => {
          button.disabled = true;
        });
        log.textContent = "Running...";

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await response.json();
          log.textContent = [
            result.ok ? "OK" : "Failed",
            result.stdout,
            result.stderr,
          ]
            .filter(Boolean)
            .join("\n\n");
        } catch (error) {
          log.textContent = `Failed\n\n${error.message}`;
        } finally {
          buttons.forEach((button) => {
            button.disabled = false;
          });
        }
      }

      bindPair(speed, speedNumber);
      bindPair(seconds, secondsNumber);
      bindPair(mixSeconds, mixSecondsNumber);
      setMix(0, 0);

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        pulse({
          side: formValue("side"),
          direction: formValue("direction"),
          speed: Number(speed.value),
          seconds: Number(seconds.value),
        });
      });

      stop.addEventListener("click", () => {
        pulse({
          side: formValue("side"),
          direction: "forward",
          speed: 0,
          seconds: 0.1,
        });
      });

      mixPad.addEventListener("pointerdown", (event) => {
        mixPad.setPointerCapture(event.pointerId);
        setMixFromPointer(event);
      });

      mixPad.addEventListener("pointermove", (event) => {
        if (mixPad.hasPointerCapture(event.pointerId)) {
          setMixFromPointer(event);
        }
      });

      mixPad.addEventListener("pointerup", (event) => {
        mixPad.releasePointerCapture(event.pointerId);
      });

      mixPulse.addEventListener("click", () => {
        pulse({
          left: Number(mixState.left.toFixed(3)),
          right: Number(mixState.right.toFixed(3)),
          seconds: Number(mixSeconds.value),
        }, "/api/mix");
      });

      mixReset.addEventListener("click", () => {
        setMix(0, 0);
      });
    </script>
  </body>
</html>
